<!DOCTYPE html>
<html>
<head>
  <title>Flight Search</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h2>Flight Search</h2>

    <div class="search-box">
      <input id="from-input" placeholder="FROM">
      <input id="to-input" placeholder="TO">
      <input id="date-input" type="date">

      <select id="time-filter">
        <option value="all">All Day</option>
        <option value="morning">Morning (06–12)</option>
        <option value="afternoon">Afternoon (12–18)</option>
        <option value="evening">Evening (18–00)</option>
        <option value="night">Night (00–06)</option>
      </select>

      <button id="search-btn">Search</button>
      <button id="sort-btn">Sort: Time ↑</button>
    </div>

    <div id="output"></div>
  </div>

  <script src="airports.js"></script>
  <script src="api.js"></script>
  <script src="app.js"></script>

</body>
</html>
